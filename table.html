<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3 Image Slider</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    .carousel-item img {
      height: 500px;
      object-fit: cover;
    }
  </style>
</head>
<body>

  <!-- Image Slider -->
  <div id="imageSlider" class="carousel slide" data-bs-ride="carousel">

    <!-- Indicators -->
    <div class="carousel-indicators">
      <button type="button" data-bs-target="#imageSlider" data-bs-slide-to="0" class="active"></button>
      <button type="button" data-bs-target="#imageSlider" data-bs-slide-to="1"></button>
      <button type="button" data-bs-target="#imageSlider" data-bs-slide-to="2"></button>
    </div>

    <!-- Slides -->
    <div class="carousel-inner">

      <div class="carousel-item active">
        <img src="istockphoto-1846551148-612x612.jpg" class="d-block w-100" alt="Image 1">
      </div>

      <div class="carousel-item">
        <img src="istockphoto-1125859092-612x612.jpg" class="d-block w-100" alt="Image 2">
      </div>

      <div class="carousel-item">
        <img src="istockphoto-2159842667-612x612.jpg" class="d-block w-100" alt="Image 3">
      </div>

    </div>

    <!-- Previous Button -->
    <button class="carousel-control-prev" type="button" data-bs-target="#imageSlider" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>

    <!-- Next Button -->
    <button class="carousel-control-next" type="button" data-bs-target="#imageSlider" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>

  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
