<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitation Card</title>


  <link rel="stylesheet" href="card.css">
</head>

<body>

  <div class="card">

    <img 
      class="top-image"
      src=
      alt="Invitation Image"
    >

    <div class="content">

      <h1>You're Invited!</h1>

      <h2>Birthday Celebration 🎉</h2>

      <p>
        Join us for a magical evening filled with fun,
        music, food, and unforgettable memories.
      </p>

      <div class="details">
        <p><strong>Date:</strong> 25 December 2026</p>
        <p><strong>Time:</strong> 7:00 PM</p>
        <p><strong>Venue:</strong> Grand Palace Hall, Ahmedabad</p>
      </div>

      <a 
        class="btn"
        href="https://maps.google.com/?q=Grand+Palace+Hall+Ahmedabad"
        target="_blank"
      >
        View Location
      </a>

      <div class="map-container">
        <iframe
          src="https://www.google.com/maps?q=Ahmedabad&output=embed"
          allowfullscreen
          loading="lazy">
        </iframe>
      </div>

      <div class="footer">
        We look forward to celebrating with you ❤️
      </div>

    </div>
  </div>

</body>
</html>
